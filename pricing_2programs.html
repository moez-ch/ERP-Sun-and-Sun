<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Arial', sans-serif; background: #fff; color: #1B2E5E; width: 338.67mm; min-height: 190.5mm; }
  .page { display: flex; flex-direction: column; min-height: 190.5mm; }

  .top { padding: 40px 50px 28px; background: #fff; text-align: center; }
  .title { font-size: 34px; font-weight: 900; color: #4B6428; letter-spacing: 3px; margin-bottom: 8px; }
  .client { font-size: 14px; font-weight: 700; color: #1B2E5E; }

  .columns-section { padding: 0 30px; background: #fff; }
  .cols { display: flex; gap: 14px; }
  .col { flex: 1; border-radius: 10px; overflow: hidden; box-shadow: 0 3px 16px rgba(27,46,94,0.10); }
  .col-header { padding: 16px 14px; text-align: center; }
  .col-header span { color: #fff; font-size: 13px; font-weight: 700; line-height: 1.4; }
  .h1 { background: #1A2847; }
  .h2 { background: #4B6428; }
  .col-body { background: #fff; padding: 22px 16px; }
  .price-label { text-align: center; font-size: 12px; color: #1B5EA8; font-weight: 700; margin-bottom: 5px; }
  .price-value { text-align: center; font-size: 20px; font-weight: 900; color: #1B2E5E; margin-bottom: 18px; }
  .divider { border: none; border-top: 1px solid #E0EAF4; margin: 4px 0 14px; }

  .dark-section { background: linear-gradient(135deg, #2D5016 0%, #1B2E5E 100%); padding: 28px 50px 36px; flex: 1; display: flex; flex-direction: column; align-items: center; margin-top: 24px; }
  .notes-area { background: rgba(255,255,255,0.12); border-radius: 10px; padding: 14px 20px; width: 100%; }
  .notes-text { font-size: 10px; color: rgba(255,255,255,0.85); font-style: italic; line-height: 1.6; text-align: center; }
  .date { text-align: right; font-size: 10px; color: rgba(255,255,255,0.55); margin-top: 10px; width: 100%; }
</style>
</head>
<body>
<div class="page">
  <div class="top">
    <div class="title">ÜCRETLENDİRME</div>
    <div class="client">@@party2_name@@</div>
  </div>

  <div class="columns-section">
    <div class="cols">
      <div class="col">
        <div class="col-header h1"><span>@@program_name@@</span></div>
        <div class="col-body">
          <div class="price-label">Hizmet Bedeli</div>
          <div class="price-value">@@down_payment@@ TL + KDV</div>
          <hr class="divider">
          <div class="price-label">Başarı Primi</div>
          <div class="price-value">%@@success_bonus@@ + KDV</div>
        </div>
      </div>
      <div class="col">
        <div class="col-header h2"><span>@@program2_name@@</span></div>
        <div class="col-body">
          <div class="price-label">Hizmet Bedeli</div>
          <div class="price-value">@@program2_fee@@ TL + KDV</div>
          <hr class="divider">
          <div class="price-label">Başarı Primi</div>
          <div class="price-value">%@@program2_bonus@@ + KDV</div>
        </div>
      </div>
    </div>
  </div>

  <div class="dark-section">
    <div class="notes-area">
      <div class="notes-text" style="text-align:center;">@@notes@@</div>
    </div>
    <div class="date">@@contract_date@@</div>
  </div>
</div>
</body>
</html>
