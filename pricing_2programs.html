<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"></head>
<body style="margin:0;padding:0;font-family:Arial,sans-serif;background:#fff;color:#1B2E5E;">

<table width="640" align="center" cellpadding="0" cellspacing="0" border="0">

  <!-- TITLE -->
  <tr>
    <td align="center" style="font-size:30pt;font-weight:900;color:#4B6428;letter-spacing:3px;padding:32px 20px 14px;">UCRETLENDİRME</td>
  </tr>

  <!-- CLIENT NAME -->
  <tr>
    <td align="center" style="font-size:13pt;font-weight:700;color:#1B2E5E;padding:0 20px 26px;">@@party2_name@@</td>
  </tr>

  <!-- SINGLE TABLE: headers + pricing in one -->
  <tr>
    <td style="padding:0 16px;">
      <table width="100%" cellpadding="0" cellspacing="0" border="0">

        <!-- HEADER ROW -->
        <tr>
          <td width="50%" bgcolor="#1A2847" align="center" style="padding:14px 12px;">
            <span style="color:#fff;font-size:12pt;font-weight:700;">@@program_name@@</span>
          </td>
          <td width="6" bgcolor="#ffffff">&nbsp;</td>
          <td width="50%" bgcolor="#4B6428" align="center" style="padding:14px 12px;">
            <span style="color:#fff;font-size:12pt;font-weight:700;">@@program2_name@@</span>
          </td>
        </tr>

        <!-- SPACER ROW -->
        <tr><td colspan="3" height="6" bgcolor="#ffffff">&nbsp;</td></tr>

        <!-- SERVICE FEE LABEL ROW -->
        <tr>
          <td bgcolor="#F3F7FD" align="center" style="font-size:11pt;color:#1B5EA8;font-weight:700;padding:20px 10px 6px;">Hizmet Bedeli</td>
          <td bgcolor="#ffffff">&nbsp;</td>
          <td bgcolor="#F3F7FD" align="center" style="font-size:11pt;color:#1B5EA8;font-weight:700;padding:20px 10px 6px;">Hizmet Bedeli</td>
        </tr>

        <!-- SERVICE FEE VALUE ROW -->
        <tr>
          <td bgcolor="#F3F7FD" align="center" style="font-size:15pt;font-weight:900;color:#1B2E5E;padding:4px 10px 20px;">@@down_payment@@ TL + KDV</td>
          <td bgcolor="#ffffff">&nbsp;</td>
          <td bgcolor="#F3F7FD" align="center" style="font-size:15pt;font-weight:900;color:#1B2E5E;padding:4px 10px 20px;">@@program2_fee@@ TL + KDV</td>
        </tr>

        <!-- SMALL SPACER -->
        <tr>
          <td bgcolor="#F3F7FD" height="4">&nbsp;</td>
          <td bgcolor="#ffffff">&nbsp;</td>
          <td bgcolor="#F3F7FD" height="4">&nbsp;</td>
        </tr>

        <!-- BONUS LABEL ROW -->
        <tr>
          <td bgcolor="#F3F7FD" align="center" style="font-size:11pt;color:#1B5EA8;font-weight:700;padding:10px 10px 6px;">Başarı Primi</td>
          <td bgcolor="#ffffff">&nbsp;</td>
          <td bgcolor="#F3F7FD" align="center" style="font-size:11pt;color:#1B5EA8;font-weight:700;padding:10px 10px 6px;">Başarı Primi</td>
        </tr>

        <!-- BONUS VALUE ROW -->
        <tr>
          <td bgcolor="#F3F7FD" align="center" style="font-size:15pt;font-weight:900;color:#1B2E5E;padding:4px 10px 24px;">%@@success_bonus@@ + KDV</td>
          <td bgcolor="#ffffff">&nbsp;</td>
          <td bgcolor="#F3F7FD" align="center" style="font-size:15pt;font-weight:900;color:#1B2E5E;padding:4px 10px 24px;">%@@program2_bonus@@ + KDV</td>
        </tr>

      </table>
    </td>
  </tr>

  <!-- SPACER -->
  <tr><td height="24">&nbsp;</td></tr>

  <!-- SPLIT BAR -->
  <tr>
    <td>
      <table width="100%" cellpadding="0" cellspacing="0" border="0">
        <tr>
          <td width="50%" height="60" bgcolor="#4B6428">&nbsp;</td>
          <td width="50%" height="60" bgcolor="#1B3060">&nbsp;</td>
        </tr>
      </table>
    </td>
  </tr>

  <!-- NOTES -->
  <tr>
    <td style="padding:16px 20px 6px;">
      <table width="100%" cellpadding="12" cellspacing="0" border="1" bordercolor="#C8D8EE" bgcolor="#F7FAFF">
        <tr>
          <td style="font-size:9pt;color:#4A5568;font-style:italic;line-height:1.6;">@@notes@@</td>
        </tr>
      </table>
    </td>
  </tr>

  <!-- DATE -->
  <tr>
    <td align="right" style="font-size:9pt;color:#9AA3B0;padding:8px 20px 30px;">@@contract_date@@</td>
  </tr>

</table>
</body>
</html>
