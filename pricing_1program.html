<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Arial', sans-serif; background: #fff; color: #1B2E5E; width: 338.67mm; min-height: 190.5mm; }
  .page { display: flex; flex-direction: column; min-height: 190.5mm; }

  .top { padding: 36px 80px 0; background: #fff; text-align: center; }
  .title { font-size: 40px; font-weight: 900; color: #1B2E5E; letter-spacing: 4px; margin-bottom: 10px; }
  .client { font-size: 16px; font-weight: 700; color: #4B6428; margin-bottom: 24px; }
  .badge { display: inline-block; background: #4B6428; color: #fff; font-size: 15px; font-weight: 700; padding: 13px 60px; border-radius: 6px; margin-bottom: 0; }

  .dark-section { background: linear-gradient(135deg, #2D5016 0%, #1B2E5E 100%); padding: 30px 100px 36px; flex: 1; display: flex; flex-direction: column; align-items: center; }
  .card { background: #fff; border-radius: 14px; padding: 30px 60px; width: 100%; max-width: 640px; box-shadow: 0 8px 32px rgba(0,0,0,0.18); }
  .price-label { text-align: center; font-size: 14px; color: #1B5EA8; font-weight: 700; margin-bottom: 6px; }
  .price-value { text-align: center; font-size: 28px; font-weight: 900; color: #1B2E5E; margin-bottom: 20px; }
  .divider { border: none; border-top: 1px solid #E0EAF4; margin: 4px 0 16px; }

  .notes-area { background: rgba(255,255,255,0.12); border-radius: 10px; padding: 12px 24px; margin-top: 18px; width: 100%; text-align: center; }
  .notes-text { font-size: 11px; color: rgba(255,255,255,0.85); font-style: italic; line-height: 1.6; text-align: center; }
  .date { text-align: right; font-size: 10px; color: rgba(255,255,255,0.55); margin-top: 10px; width: 100%; }
</style>
</head>
<body>
<div class="page">
  <div class="top">
    <div class="title">ÜCRETLENDİRME</div>
    <div class="client">@@party2_name@@</div>
    <div class="badge">@@program_name@@</div>
  </div>

  <div class="dark-section">
    <div class="card">
      <div class="price-label">Hizmet Bedeli</div>
      <div class="price-value">@@down_payment@@ TL + KDV</div>
      <hr class="divider">
      <div class="price-label">Başarı Primi</div>
      <div class="price-value">%@@success_bonus@@ + KDV</div>
    </div>
    <div class="notes-area">
      <div class="notes-text" style="text-align:center;">@@notes@@</div>
    </div>
    <div class="date">@@contract_date@@</div>
  </div>
</div>
</body>
</html>
