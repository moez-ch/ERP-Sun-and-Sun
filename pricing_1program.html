<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"></head>
<body style="margin:0;padding:0;font-family:Arial,sans-serif;background:#fff;color:#1B2E5E;">

<table width="640" align="center" cellpadding="0" cellspacing="0" border="0">

  <!-- TITLE -->
  <tr>
    <td align="center" style="font-size:34pt;font-weight:900;color:#1B2E5E;letter-spacing:4px;padding:36px 20px 16px;">PRICING</td>
  </tr>

  <!-- CLIENT NAME -->
  <tr>
    <td align="center" style="font-size:13pt;font-weight:700;color:#4B6428;padding:0 20px 6px;">@@party2_name@@</td>
  </tr>

  <!-- SPACER -->
  <tr><td height="18">&nbsp;</td></tr>

  <!-- PROGRAM BADGE -->
  <tr>
    <td align="center" style="padding:0 20px 22px;">
      <table align="center" cellpadding="0" cellspacing="0" border="0" bgcolor="#4B6428">
        <tr>
          <td align="center" style="color:#fff;font-size:13pt;font-weight:700;padding:13px 50px;">@@program_name@@</td>
        </tr>
      </table>
    </td>
  </tr>

  <!-- CARD: Service Fee -->
  <tr>
    <td style="padding:0 50px 0;">
      <table width="100%" cellpadding="0" cellspacing="0" border="0" bgcolor="#F3F7FD">
        <tr>
          <td align="center" style="font-size:12pt;color:#1B5EA8;font-weight:700;padding:26px 20px 8px;">Service Fee</td>
        </tr>
        <tr>
          <td align="center" style="font-size:20pt;font-weight:900;color:#1B2E5E;padding:4px 20px 26px;">@@down_payment@@ TL + VAT</td>
        </tr>
      </table>
    </td>
  </tr>

  <!-- SPACER between sections -->
  <tr><td height="10">&nbsp;</td></tr>

  <!-- CARD: Success Bonus -->
  <tr>
    <td style="padding:0 50px 0;">
      <table width="100%" cellpadding="0" cellspacing="0" border="0" bgcolor="#F3F7FD">
        <tr>
          <td align="center" style="font-size:12pt;color:#1B5EA8;font-weight:700;padding:22px 20px 8px;">Success Bonus</td>
        </tr>
        <tr>
          <td align="center" style="font-size:20pt;font-weight:900;color:#1B2E5E;padding:4px 20px 26px;">%@@success_bonus@@ + VAT</td>
        </tr>
      </table>
    </td>
  </tr>

  <!-- SPACER -->
  <tr><td height="24">&nbsp;</td></tr>

  <!-- SPLIT BAR -->
  <tr>
    <td>
      <table width="100%" cellpadding="0" cellspacing="0" border="0">
        <tr>
          <td width="50%" height="60" bgcolor="#4B6428">&nbsp;</td>
          <td width="50%" height="60" bgcolor="#1B3060">&nbsp;</td>
        </tr>
      </table>
    </td>
  </tr>

  <!-- NOTES -->
  <tr>
    <td style="padding:16px 20px 6px;">
      <table width="100%" cellpadding="12" cellspacing="0" border="1" bordercolor="#C8D8EE" bgcolor="#F7FAFF">
        <tr>
          <td style="font-size:9pt;color:#4A5568;font-style:italic;line-height:1.6;">@@notes@@</td>
        </tr>
      </table>
    </td>
  </tr>

  <!-- DATE -->
  <tr>
    <td align="right" style="font-size:9pt;color:#9AA3B0;padding:8px 20px 30px;">@@contract_date@@</td>
  </tr>

</table>
</body>
</html>
